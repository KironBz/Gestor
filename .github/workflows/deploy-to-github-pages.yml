name: 🚀 Desplegar a GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout del código
        uses: actions/checkout@v4

      - name: ⚙️ Setup .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: 🧹 Restaurar dependencias
        run: dotnet restore "YESS MV/YESSMobilePWA/YESSMobilePWA.csproj"

      - name: 🏗️ Publicar la aplicación
        run: dotnet publish "YESS MV/YESSMobilePWA/YESSMobilePWA.csproj" -c Release -o publish

      - name: 📤 Subir artefacto para desplegar
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./publish/wwwroot

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: 🚀 Desplegar a GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
